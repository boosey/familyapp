<!-- @dsCard group="Components" viewport="700x620" name="Kindred Core" subtitle="Buttons, voice, chips, prompt, audio, story card" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  .pulse { animation: kin-pulse 2.6s ease-in-out infinite; }
  body { margin:0; }
</style></head>
<body><div style="background:var(--kin-surface); padding:26px; font-family:var(--kin-font-sans); display:flex; flex-direction:column; gap:22px;">

  <!-- buttons -->
  <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:14px;">
    <button style="height:64px; border:none; border-radius:14px; background:var(--kin-accent); color:var(--kin-on-accent); font-family:var(--kin-font-sans); font-size:18px; font-weight:600;">Save this story</button>
    <button style="height:64px; border:1.5px solid var(--kin-field); border-radius:14px; background:transparent; color:var(--kin-body); font-family:var(--kin-font-sans); font-size:18px; font-weight:600;">Maybe later</button>
    <button style="height:64px; border:none; border-radius:14px; background:transparent; color:var(--kin-accent); font-family:var(--kin-font-sans); font-size:18px; font-weight:600;">Skip this question</button>
  </div>

  <div style="display:grid; grid-template-columns:1fr 1.4fr; gap:18px; align-items:stretch;">
    <!-- voice -->
    <div style="display:flex; align-items:center; justify-content:center; gap:24px; background:var(--kin-paper); border:1px solid var(--kin-line); border-radius:16px; padding:18px;">
      <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
        <div class="pulse" style="width:88px; height:88px; border-radius:50%; background:var(--kin-accent); display:flex; align-items:center; justify-content:center;"><span style="width:28px; height:42px; border-radius:15px; background:var(--kin-on-accent);"></span></div>
        <span style="font-size:14px; font-weight:700; color:var(--kin-ink-2);">Tap to speak</span>
      </div>
      <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
        <div style="width:88px; height:88px; border-radius:50%; background:var(--kin-tint); border:2px solid var(--kin-accent); display:flex; align-items:center; justify-content:center;"><span style="width:24px; height:24px; border-radius:6px; background:var(--kin-accent);"></span></div>
        <span style="font-size:14px; font-weight:700; color:var(--kin-accent);">Recording&hellip;</span>
      </div>
    </div>
    <!-- chips -->
    <div style="display:flex; flex-wrap:wrap; gap:8px; align-content:center; background:var(--kin-paper); border:1px solid var(--kin-line); border-radius:16px; padding:18px;">
      <span style="display:inline-flex; align-items:center; gap:9px; background:var(--kin-chip-bg); border:1px solid var(--kin-chip-border); border-radius:999px; padding:8px 16px 8px 8px; font-size:15px; font-weight:500; color:var(--kin-ink);"><span style="width:26px;height:26px;border-radius:50%;background:var(--kin-sage);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;">M</span>Maria</span>
      <span style="display:inline-flex; align-items:center; gap:9px; background:var(--kin-chip-bg); border:1px solid var(--kin-chip-border); border-radius:999px; padding:8px 16px 8px 8px; font-size:15px; font-weight:500; color:var(--kin-ink);"><span style="width:26px;height:26px;border-radius:50%;background:var(--kin-accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;">T</span>Tony</span>
      <span style="display:inline-flex; align-items:center; gap:8px; border:1.5px solid var(--kin-field); border-radius:999px; padding:8px 16px; font-size:15px; color:var(--kin-ink-2);">&#128205; Amalfi</span>
      <span style="display:inline-flex; align-items:center; border:1.5px solid var(--kin-field); border-radius:999px; padding:8px 16px; font-size:15px; font-weight:600; color:var(--kin-ink-2); font-family:var(--kin-font-mono);">1962</span>
    </div>
  </div>

  <!-- prompt -->
  <div style="background:var(--kin-tint); border:1px solid var(--kin-tint-border); border-radius:16px; padding:22px 24px;">
    <div style="display:flex; align-items:center; gap:8px; font-size:12px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--kin-accent); margin-bottom:12px;"><span style="width:6px;height:6px;border-radius:50%;background:var(--kin-accent);"></span>A question for Sal</div>
    <div style="font-family:var(--kin-font-serif); font-size:28px; line-height:1.25; color:var(--kin-ink);">What was your mother like when you were small?</div>
  </div>

  <!-- listen bar -->
  <div style="display:flex; align-items:center; gap:18px; background:var(--kin-paper); border:1px solid var(--kin-line); border-radius:16px; padding:16px 20px;">
    <div style="width:52px;height:52px;flex-shrink:0;border-radius:50%;background:var(--kin-accent);display:flex;align-items:center;justify-content:center;"><span style="width:0;height:0;border-left:16px solid var(--kin-on-accent);border-top:11px solid transparent;border-bottom:11px solid transparent;margin-left:4px;"></span></div>
    <div style="flex:1; display:flex; align-items:center; gap:3px; height:36px;">
      <span style="flex:1;height:6px;border-radius:2px;background:var(--kin-gold);"></span><span style="flex:1;height:12px;border-radius:2px;background:var(--kin-gold);"></span><span style="flex:1;height:20px;border-radius:2px;background:var(--kin-gold);"></span><span style="flex:1;height:28px;border-radius:2px;background:var(--kin-gold);"></span><span style="flex:1;height:18px;border-radius:2px;background:var(--kin-gold);"></span><span style="flex:1;height:10px;border-radius:2px;background:var(--kin-gold);"></span><span style="flex:1;height:24px;border-radius:2px;background:var(--kin-gold);"></span><span style="flex:1;height:32px;border-radius:2px;background:var(--kin-gold);"></span><span style="flex:1;height:22px;border-radius:2px;background:var(--kin-gold);"></span><span style="flex:1;height:14px;border-radius:2px;background:var(--kin-gold);"></span><span style="flex:1;height:8px;border-radius:2px;background:var(--kin-gold);"></span><span style="flex:1;height:18px;border-radius:2px;background:var(--kin-gold);"></span><span style="flex:1;height:26px;border-radius:2px;background:var(--kin-gold);"></span><span style="flex:1;height:16px;border-radius:2px;background:var(--kin-gold);"></span><span style="flex:1;height:10px;border-radius:2px;background:var(--kin-gold);"></span><span style="flex:1;height:20px;border-radius:2px;background:var(--kin-gold);"></span><span style="flex:1;height:30px;border-radius:2px;background:var(--kin-gold);"></span><span style="flex:1;height:14px;border-radius:2px;background:var(--kin-gold);"></span><span style="flex:1;height:22px;border-radius:2px;background:var(--kin-gold);"></span><span style="flex:1;height:12px;border-radius:2px;background:var(--kin-gold);"></span>
    </div>
    <span style="font-family:var(--kin-font-mono); font-size:14px; color:var(--kin-ink-2);">3:48</span>
  </div>

  <!-- story card -->
  <div style="display:flex; gap:20px; align-items:center; background:var(--kin-paper); border:1px solid var(--kin-line); border-radius:16px; padding:18px;">
    <div style="width:96px; height:96px; flex-shrink:0; border-radius:12px; background-color:var(--kin-ph-b); background-image:repeating-linear-gradient(45deg,var(--kin-ph-a) 0 10px,var(--kin-ph-b) 10px 20px); display:flex; align-items:flex-end; justify-content:center; padding-bottom:6px;"><span style="font-family:var(--kin-font-mono); font-size:10px; color:var(--kin-ph-text);">photo</span></div>
    <div style="flex:1;">
      <div style="font-family:var(--kin-font-mono); font-size:12px; color:var(--kin-accent); letter-spacing:.04em;">1962 &middot; THE COAST</div>
      <div style="font-family:var(--kin-font-serif); font-size:26px; line-height:1.2; margin:6px 0; color:var(--kin-ink);">The summer we drove to the coast</div>
      <div style="font-size:15px; color:var(--kin-ink-2);">Told by Salvatore &middot; 4 min listen &middot; 2 photos</div>
    </div>
    <span style="width:48px;height:48px;border-radius:50%;border:1.5px solid var(--kin-field);display:flex;align-items:center;justify-content:center;color:var(--kin-accent);font-size:22px;flex-shrink:0;">&rsaquo;</span>
  </div>

</div></body></html>
