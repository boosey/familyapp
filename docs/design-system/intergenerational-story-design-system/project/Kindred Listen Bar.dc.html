<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
  * { box-sizing: border-box; }
  @import url("https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500&family=Public+Sans:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap");
</style>
</helmet>
<div style="background:{{ paper }}; border:1px solid {{ line }}; border-radius:16px; padding:18px 22px;">
  <p style="font-family:'Public Sans',sans-serif; font-size:18px; font-weight:600; color:{{ ink }}; margin:0 0 14px;">{{ title }}</p>
  <!-- scrubber -->
  <div style="display:flex; align-items:center; gap:14px;">
    <span style="font-family:'DM Mono',monospace; font-size:14px; color:{{ ink2 }}; flex:0 0 auto; min-width:38px;">{{ cur }}</span>
    <div ref="{{ trackRef }}" onPointerDown="{{ scrubDown }}" style="position:relative; flex:1; height:22px; display:flex; align-items:center; cursor:pointer; touch-action:none;">
      <div style="position:absolute; left:0; right:0; height:5px; border-radius:999px; background:{{ rail }};"></div>
      <div style="position:absolute; left:0; width:{{ pct }}; height:5px; border-radius:999px; background:{{ accent }};"></div>
      <div style="position:absolute; left:{{ pct }}; transform:translateX(-50%); width:18px; height:18px; border-radius:50%; background:{{ accent }}; box-shadow:0 2px 6px rgba(70,50,30,0.22); border:2px solid {{ paper }};"></div>
    </div>
    <span style="font-family:'DM Mono',monospace; font-size:14px; color:{{ ink2 }}; flex:0 0 auto; min-width:38px; text-align:right;">{{ dur }}</span>
  </div>
  <!-- controls -->
  <div style="display:flex; align-items:center; justify-content:center; gap:18px; margin-top:14px;">
    <button onClick="{{ restart }}" title="Start over" aria-label="Start over" style="width:46px; height:46px; border-radius:50%; border:1.5px solid {{ rail }}; background:{{ paper }}; color:{{ accent }}; cursor:pointer; font-size:20px; display:inline-flex; align-items:center; justify-content:center;">⏮</button>
    <button onClick="{{ back10 }}" title="Back 10 seconds" aria-label="Back 10 seconds" style="position:relative; width:46px; height:46px; border-radius:50%; border:1.5px solid {{ rail }}; background:{{ paper }}; color:{{ accent }}; cursor:pointer; display:inline-flex; align-items:center; justify-content:center;">
      <span style="font-size:30px; line-height:1;">↺</span>
      <span style="position:absolute; font-family:'DM Mono',monospace; font-size:10px; font-weight:700; top:50%; left:50%; transform:translate(-50%,-40%);">10</span>
    </button>
    <button onClick="{{ toggle }}" title="Play or pause" aria-label="Play or pause" style="width:62px; height:62px; border-radius:50%; border:none; background:{{ accent }}; color:{{ onAccent }}; cursor:pointer; font-size:24px; display:inline-flex; align-items:center; justify-content:center;">{{ glyph }}</button>
    <button onClick="{{ fwd10 }}" title="Forward 10 seconds" aria-label="Forward 10 seconds" style="position:relative; width:46px; height:46px; border-radius:50%; border:1.5px solid {{ rail }}; background:{{ paper }}; color:{{ accent }}; cursor:pointer; display:inline-flex; align-items:center; justify-content:center;">
      <span style="font-size:30px; line-height:1;">↻</span>
      <span style="position:absolute; font-family:'DM Mono',monospace; font-size:10px; font-weight:700; top:50%; left:50%; transform:translate(-50%,-40%);">10</span>
    </button>
    <sc-if value="{{ showNext }}" hint-placeholder-val="{{ true }}">
      <button onClick="{{ next }}" title="Next story" aria-label="Next story" style="width:46px; height:46px; border-radius:50%; border:1.5px solid {{ rail }}; background:{{ paper }}; color:{{ accent }}; cursor:pointer; font-size:20px; display:inline-flex; align-items:center; justify-content:center;">⏭</button>
    </sc-if>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 540, &quot;height&quot;: 168 },
  &quot;palette&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;Heirloom&quot;, &quot;Archive&quot;, &quot;Hearth&quot;], &quot;default&quot;: &quot;Heirloom&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;title&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Sal’s voice — the original recording&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;duration&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;3:48&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;showNext&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; }
}">
class Component extends DCLogic {
  state = { sec: 0, playing: false };

  PAL = {
    heirloom: { paper:'#F5F0E6', line:'#E8E0D1', accent:'#AE5C39', onAccent:'#FBF3EC', rail:'#D7CDB9', ink:'#2E2620', ink2:'#6C6357' },
    archive:  { paper:'#F1F1EE', line:'#E2E2DE', accent:'#4E6478', onAccent:'#F5F8FA', rail:'#CFD3D6', ink:'#262B30', ink2:'#5C636B' },
    hearth:   { paper:'#F6ECEA', line:'#ECDFDB', accent:'#AF6A64', onAccent:'#FBF1EF', rail:'#DCC9C3', ink:'#2E2422', ink2:'#6E625C' },
  };

  parseDur(str) {
    const parts = String(str ?? '3:48').split(':').map(n => parseInt(n, 10) || 0);
    return parts.length === 2 ? parts[0] * 60 + parts[1] : parts[0];
  }
  fmt(sec) {
    sec = Math.max(0, Math.min(this.total(), Math.round(sec)));
    const m = Math.floor(sec / 60), s = sec % 60;
    return m + ':' + String(s).padStart(2, '0');
  }
  total() { return this.parseDur(this.props.duration); }

  set(sec) { this.setState({ sec: Math.max(0, Math.min(this.total(), sec)) }); }
  tick = () => this.setState(s => {
    if (!s.playing) return null;
    const next = s.sec + 0.5;
    if (next >= this.total()) return { sec: this.total(), playing: false };
    return { sec: next };
  });
  toggle = () => this.setState(s => {
    const playing = !s.playing;
    if (playing) { if (!this._int) this._int = setInterval(this.tick, 500); }
    else if (this._int) { clearInterval(this._int); this._int = null; }
    return { playing, sec: (playing && s.sec >= this.total()) ? 0 : s.sec };
  });
  restart = () => this.set(0);
  back10 = () => this.set(this.state.sec - 10);
  fwd10 = () => this.set(this.state.sec + 10);
  next = () => { if (this._int) { clearInterval(this._int); this._int = null; } this.setState({ sec: 0, playing: false }); };
  componentWillUnmount() { if (this._int) clearInterval(this._int); }

  trackRef = (el) => { this._track = el; };
  seek = (e) => {
    const el = this._track; if (!el) return;
    const r = el.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
    this.set(ratio * this.total());
  };
  scrubDown = (e) => {
    e.preventDefault();
    this.seek(e);
    const move = (ev) => this.seek(ev);
    const up = () => { window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  renderVals() {
    const key = this.PAL[String(this.props.palette ?? 'Heirloom').toLowerCase()] ? String(this.props.palette).toLowerCase() : 'heirloom';
    const c = this.PAL[key];
    return {
      ...c,
      title: this.props.title ?? 'Sal’s voice — the original recording',
      dur: this.props.duration ?? '3:48',
      cur: this.fmt(this.state.sec),
      pct: (this.state.sec / this.total()) * 100 + '%',
      glyph: this.state.playing ? '❚❚' : '▶',
      showNext: this.props.showNext ?? true,
      trackRef: this.trackRef, scrubDown: this.scrubDown,
      restart: this.restart, back10: this.back10, toggle: this.toggle, fwd10: this.fwd10, next: this.next,
    };
  }
}
</script>
</body>
</html>
