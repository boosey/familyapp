<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  @keyframes kin-pulse { 0%,100% { box-shadow: 0 0 0 0 var(--ring, rgba(140,90,60,.30)); } 50% { box-shadow: 0 0 0 16px var(--ring0, rgba(140,90,60,0)); } }
</style>
</helmet>
<div style="display:flex; flex-direction:column; align-items:center; gap:12px; font-family:'Public Sans',sans-serif; padding:18px;">
  <div style="{{ ringStyle }}">{{ glyph }}</div>
  <div style="font-size:16px; font-weight:700; color:{{ labelColor }};">{{ label }}</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 240, &quot;height&quot;: 180 },
  &quot;palette&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;Heirloom&quot;, &quot;Archive&quot;, &quot;Hearth&quot;], &quot;default&quot;: &quot;Heirloom&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;state&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;Idle&quot;, &quot;Recording&quot;], &quot;default&quot;: &quot;Idle&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;label&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Tap to speak&quot;, &quot;tsType&quot;: &quot;string&quot; }
}">
class Component extends DCLogic {
  mic(col, H) {
    const px = n => `${n}px`;
    const span = (key, s) => React.createElement('span', { key, style: s });
    return React.createElement('span', {
      'aria-hidden': 'true',
      style: { position:'relative', display:'inline-block', width:px(H*0.72), height:px(H) }
    }, [
      span('head', { position:'absolute', left:'50%', top:0, transform:'translateX(-50%)', width:px(H*0.46), height:px(H*0.62), borderRadius:px(H*0.23), background:col }),
      span('cradle', { position:'absolute', left:'50%', top:px(H*0.28), transform:'translateX(-50%)', width:px(H*0.72), height:px(H*0.44), border:`${px(H*0.075)} solid ${col}`, borderTop:'none', borderRadius:`0 0 ${px(H*0.36)} ${px(H*0.36)}`, boxSizing:'border-box' }),
      span('stem', { position:'absolute', left:'50%', top:px(H*0.72), transform:'translateX(-50%)', width:px(H*0.075), height:px(H*0.18), background:col }),
      span('base', { position:'absolute', left:'50%', bottom:0, transform:'translateX(-50%)', width:px(H*0.42), height:px(H*0.075), borderRadius:'2px', background:col }),
    ]);
  }
  renderVals() {
    const PAL = {
      heirloom: { accent:'#AE5C39', tint:'#F5EDDF', ink2:'#6C6357', onAccent:'#FBF3EC', ring:'rgba(174,92,57,.30)', ring0:'rgba(174,92,57,0)' },
      archive:  { accent:'#4E6478', tint:'#E6EBEF', ink2:'#5C636B', onAccent:'#F5F8FA', ring:'rgba(78,100,120,.30)', ring0:'rgba(78,100,120,0)' },
      hearth:   { accent:'#AF6A64', tint:'#F3E6E3', ink2:'#6E625C', onAccent:'#FBF1EF', ring:'rgba(175,106,100,.30)', ring0:'rgba(175,106,100,0)' },
    };
    const key = PAL[String(this.props.palette ?? 'Heirloom').toLowerCase()] ? String(this.props.palette).toLowerCase() : 'heirloom';
    const c = PAL[key];
    const recording = (this.props.state ?? 'Idle') === 'Recording';
    let ringStyle, glyph, label, labelColor;
    if (recording) {
      ringStyle = `width:96px; height:96px; border-radius:50%; background:${c.tint}; border:2px solid ${c.accent}; display:flex; align-items:center; justify-content:center; cursor:pointer;`;
      glyph = React.createElement('div', { style: { width:'26px', height:'26px', borderRadius:'6px', background:c.accent } });
      label = this.props.label ?? 'Recording…';
      labelColor = c.accent;
    } else {
      ringStyle = `width:96px; height:96px; border-radius:50%; background:${c.accent}; display:flex; align-items:center; justify-content:center; cursor:pointer; --ring:${c.ring}; --ring0:${c.ring0}; animation:kin-pulse 2.6s ease-in-out infinite;`;
      glyph = this.mic(c.onAccent, 48);
      label = this.props.label ?? 'Tap to speak';
      labelColor = c.ink2;
    }
    return { ringStyle, glyph, label, labelColor };
  }
}
</script>
</body>
</html>
