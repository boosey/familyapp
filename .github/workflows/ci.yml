name: CI

# Runs on PRs only. Direct pushes to master intentionally skip GitHub CI and go
# straight to a Vercel production build (small-change fast path). Use a PR for
# anything you want gated by lint/typecheck/test/build/drift before it ships.
on:
  pull_request:

jobs:
  # Each task runs as an INDEPENDENT matrix leg with fail-fast disabled, so a failure in one
  # (e.g. lint) can never silently skip another (e.g. build). Before this split, the steps ran
  # sequentially in one job and lint sat ahead of build — so a red lint meant `next build` never
  # executed, and a broken production build (non-async server action) sailed through to Vercel.
  verify:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [lint, typecheck, test, build]
    steps:
      # fetch-depth: 0 so the test leg can diff the PR against its base branch
      # (checkout fetches all branches/tags at full history with depth 0).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.task }}
        if: matrix.task != 'test'
        run: pnpm ${{ matrix.task }}

      # Affected-only testing: pnpm's "...[base]" filter selects packages changed since the PR
      # base PLUS every workspace package that depends on them — so a packages/db change still
      # runs apps/web's tests, while untouched leaf packages are skipped soundly (the full run
      # took ~13 min; a typical PR runs 2-4). Two escape hatches keep it safe:
      #   1. Root-level shared files (lockfile, base tsconfig, shared vitest config) belong to
      #      no package, so the filter can't see them — any change to one runs the FULL suite.
      #   2. A PR that touches no package sources at all (docs/meta-only) runs nothing.
      - name: Run affected tests (+ dependents)
        if: matrix.task == 'test'
        shell: bash
        run: |
          BASE="origin/${{ github.base_ref }}"
          CHANGED="$(git diff --name-only "$BASE...HEAD")"
          echo "Files changed since $BASE:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^(pnpm-lock\.yaml|pnpm-workspace\.yaml|tsconfig\.base\.json|vitest\.shared\.ts|package\.json)$'; then
            echo "::notice::Shared root config changed — running the FULL suite."
            pnpm test
          elif echo "$CHANGED" | grep -qE '^(apps|packages)/'; then
            echo "::notice::Running tests for affected packages (+ dependents) only."
            pnpm --filter "...[$BASE]" --workspace-concurrency=2 test
          else
            echo "::notice::No package sources changed (docs/meta-only PR) — nothing to run."
          fi

  # A dirty tree here means someone edited schema.ts without committing the regenerated snapshot +
  # migration (or forgot to hand-carry an invariant into the migration — the drift-guard unit test
  # also covers that case). db:generate is DB-less: drizzle-kit export/generate operate purely on
  # schema.ts + local meta snapshots, no DATABASE_URL.
  drift:
    name: schema/migration drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Schema/migration drift check
        run: pnpm --filter @chronicle/db db:generate && git diff --exit-code -- packages/db/drizzle
