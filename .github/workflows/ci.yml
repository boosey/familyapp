name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # A dirty tree here means someone edited schema.ts without committing the regenerated
      # snapshot + migration (or forgot to hand-carry an invariant into the migration — the
      # drift-guard unit test also covers that case). db:generate is DB-less: drizzle-kit
      # export/generate operate purely on schema.ts + local meta snapshots, no DATABASE_URL.
      - name: Schema/migration drift check
        run: pnpm --filter @chronicle/db db:generate && git diff --exit-code -- packages/db/drizzle

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
